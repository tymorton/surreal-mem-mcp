name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os_name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: surreal-mem-mcp
          - os_name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: surreal-mem-mcp
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: surreal-mem-mcp.exe
          - os_name: Linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin: surreal-mem-mcp

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}
      - name: Build binary
        working-directory: surreal-mem-mcp
        run: cargo build --release --target ${{ matrix.platform.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: surreal-mem-mcp-${{ matrix.platform.os_name }}
          path: surreal-mem-mcp/target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          overwrite: true
          files: artifacts/*/*
